<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="cor-sigilosa">
    <div class="container-app">
      <div id="cabesalho">
        <h1>Hexarmo</h1>
      </div>
      <div class="container-jogo">
        <span class="simbolo-hashtag">#</span>
        <div class="linha">
          <div class="casa" data-pos="0">
            <input type="text" maxlength="1" />
          </div>
          <div class="casa" data-pos="1">
            <input type="text" maxlength="1" />
          </div>
          <div class="casa" data-pos="2">
            <input type="text" maxlength="1" />
          </div>
          <div class="casa" data-pos="3">
            <input type="text" maxlength="1" />
          </div>
          <div class="casa" data-pos="4">
            <input type="text" maxlength="1" />
          </div>
          <div class="casa" data-pos="5">
            <input type="text" maxlength="1" />
          </div>
        </div>
      </div>
    </div>

    <script>
      const corSigilosa = document.querySelector(".cor-sigilosa");

      const hash = document.querySelector(".simbolo-hashtag");
      hash.style.color = gerarCorAleatoria();

      let corSecreta = gerarCorAleatoria();
      corSigilosa.style.backgroundColor = corSecreta;

      let tentativas = 0;

      const linha = document.querySelector(".linha");
      adicionarComandos(linha);

      function gerarCorAleatoria() {
        const letras = "0123456789ABCDEF";
        let cor = "#";
        for (let i = 0; i < 6; i++) {
          cor += letras[Math.floor(Math.random() * 16)];
        }
        return cor;
      }

      function adicionarComandos(linha) {
        const casas = linha.querySelectorAll(".casa input");
        casas.forEach((input, index) => {
          input.addEventListener("input", function (e) {
            if (this.value.length === 1 && index < 5) {
              casas[index + 1].focus();
            }
          });

          input.addEventListener("keydown", function (e) {
            if (e.key === "Backspace" && !this.value && index > 0) {
              casas[index - 1].focus();
            }

            if (e.key === "Enter" && this.value.length === 1) {
              verificarTentativa(this.parentElement.parentElement);
              criarNovaLinha();
            }
          });
        });
      }

      function verificarTentativa(linha) {
        let palpite = "";
        linha.querySelectorAll(".casa input").forEach(function (input) {
          palpite += input.value;
        });

        for (let i = 0; i < 6; i++) {
          if (palpite[i] === corSecreta[i + 1]) {
            linha.querySelectorAll(".casa input")[i].style.backgroundColor =
              "green";
          } else if (corSecreta.includes(palpite[i])) {
            linha.querySelectorAll(".casa input")[i].style.backgroundColor =
              "yellow";
          } else {
            linha.querySelectorAll(".casa input")[i].style.backgroundColor =
              "red";
          }
        }

        if (palpite.length === 6) {
          if (palpite.toUpperCase() === corSecreta.substring(1)) {
            alert("Parabéns! Você acertou a cor!");
            location.reload();
          } else {
            alert("Tente novamente!");
          }
        }
      }

      function criarNovaLinha() {
        tentativas += 1;
        if (tentativas >= 8) {
          return;
        }
        const linhaAntiga = document.querySelector(".linha");
        const novaLinha = linhaAntiga.cloneNode(true);
        linhaAntiga.style.pointerEvents = "none";
        linhaAntiga.querySelectorAll("input").forEach((el) => {
          el.setAttribute("tabindex", "-1");
        });
        novaLinha.querySelectorAll("input").forEach((input) => {
          input.value = "";
        });
        novaLinha.querySelectorAll(".casa input").forEach((input) => {
          input.style.backgroundColor = "transparent";
        });
        linhaAntiga.parentNode.appendChild(novaLinha);
        novaLinha.querySelector("input").focus();
        adicionarComandos(novaLinha);
      }
    </script>
  </body>
</html>
